<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
    body{
      min-height:100vh;
      margin:0;
      background:rgb(203, 234, 249);
      display:flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    div{
      display:flex;
      flex-direction:column;
      background: white;
      width:250px;
      height:auto;
      justify-content:center;
      align-items:center;
      text-align: center;
      padding:16px;
      border-radius: 20px;
      box-shadow:0 10px 20px rgba(0,0,0,0.1);
    }
    img{
      width:100%;
      border-radius:20px
    }
    footer{
      position:absolute;
      bottom:10px
    }
 </style>
</head>
<body>
  <div>
    <img src="./images/image-qr-code.png" alt="QR code image">
    <p style="font-weight:bold">Improve your front-end skills by building projects</p>
    <p>Scan the QR code to visit Frontend Mentor and take your coding skills to the next level
</p>
  </div>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://www.frontendmentor.io/profile/rashmi0934">Rashmi</a>.
  </footer>
</body>
</html>
